<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장비 상세 - AquaGuard AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#001e40',
            secondary: '#006a6a',
            background: '#f9f9fe',
            surface: '#ffffff',
            'surface-container': '#eef2f7',
            'surface-container-low': '#f7f7fb',
            error: '#ba1a1a',
            'error-container': '#ffdad6'
          }
        }
      }
    };
  </script>
  <style>
    body {
      background: #eef2f7;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      word-break: keep-all;
    }
    button { white-space: nowrap; }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 40;
    }
    .phone-screen {
      height: calc(100% - 28px);
      overflow-y: auto;
      overscroll-behavior: contain;
      scrollbar-width: thin;
    }
  </style>
</head>
<body class="min-h-screen bg-[#eef2f7] p-3 md:p-4">
  <div class="mx-auto h-[844px] w-[390px] overflow-hidden rounded-[36px] border border-slate-200 bg-white shadow-2xl">
    <div class="flex h-7 items-center justify-center bg-white">
      <div class="h-1.5 w-28 rounded-full bg-slate-900"></div>
    </div>

    <div class="phone-screen bg-white">
      <header class="sticky top-0 z-40 border-b bg-surface">
        <div class="flex h-16 items-center gap-3 px-4">
          <a href="index.html" aria-label="홈으로 돌아가기" class="rounded-full p-2 text-primary hover:bg-surface-container">
            <svg aria-hidden="true" class="h-7 w-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6" /></svg>
          </a>
          <h1 class="whitespace-nowrap text-[22px] font-bold text-primary">장비 상세</h1>
        </div>
      </header>

      <main class="px-5 py-6 space-y-5">
        <section>
          <h2 class="text-[32px] font-bold text-primary">메인 펌프 A동</h2>
          <div class="mt-3 inline-flex items-center gap-2 whitespace-nowrap rounded-xl bg-error-container px-3 py-2 text-[16px] font-semibold text-error">
            <span class="material-symbols-outlined text-xl">warning</span>
            즉시 점검 필요
          </div>
          <p class="mt-3 inline-flex items-center gap-2 whitespace-nowrap rounded-xl border bg-surface-container-low px-3 py-2 text-[16px] font-semibold text-slate-700">
            <span class="material-symbols-outlined text-xl text-primary">tag</span>
            PMP-A-001
          </p>
        </section>

        <section class="grid gap-4">
          <div class="rounded-2xl border p-5">
            <div class="flex items-center justify-between gap-2">
              <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary">speed</span>
                <h3 class="text-[18px] font-bold">현재 수압</h3>
              </div>
              <span class="whitespace-nowrap rounded-md bg-error-container px-2 py-1 text-[14px] font-bold text-error">위험</span>
            </div>
            <div class="mt-2 flex items-end gap-2">
              <span class="text-[44px] font-bold text-error">8.5</span>
              <span class="pb-1 text-[18px] text-slate-500">bar</span>
            </div>
          </div>
          <div class="rounded-2xl border p-5">
            <div class="flex items-center justify-between gap-2">
              <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary">device_thermostat</span>
                <h3 class="text-[18px] font-bold">현재 온도</h3>
              </div>
              <span class="whitespace-nowrap rounded-md bg-surface-container px-2 py-1 text-[14px] font-bold text-slate-700">주의</span>
            </div>
            <div class="mt-2 flex items-end gap-2">
              <span class="text-[44px] font-bold text-primary">42</span>
              <span class="pb-1 text-[18px] text-slate-500">°C</span>
            </div>
          </div>
        </section>

        <section class="rounded-2xl border-2 border-error bg-error-container/30 p-5" aria-labelledby="suspect-area-title">
          <div class="flex items-start justify-between gap-3">
            <div>
              <p class="text-[15px] font-semibold text-slate-600">AI 이상 분석 결과</p>
              <h3 id="suspect-area-title" class="mt-1 text-[22px] font-bold text-primary">의심 부위</h3>
            </div>
            <span class="material-symbols-outlined text-4xl text-error">troubleshoot</span>
          </div>
          <p class="mt-3 whitespace-nowrap text-[24px] font-bold text-error">베어링 / 모터축</p>
          <div class="mt-4 overflow-hidden rounded-xl border bg-white p-3">
            <svg class="h-44 w-full" viewBox="0 0 330 170" role="img" aria-labelledby="pump-diagram-title pump-diagram-desc">
              <title id="pump-diagram-title">메인 펌프 의심 부위 구조도</title>
              <desc id="pump-diagram-desc">펌프와 모터 사이의 베어링과 모터축을 빨간색으로 강조한 구조도입니다.</desc>
              <rect x="15" y="56" width="88" height="70" rx="18" fill="#dbeafe" stroke="#001e40" stroke-width="4"/>
              <circle cx="59" cy="91" r="25" fill="#fff" stroke="#001e40" stroke-width="4"/>
              <path d="M59 73v36M41 91h36" stroke="#006a6a" stroke-width="5" stroke-linecap="round"/>
              <text x="38" y="151" fill="#001e40" font-size="15" font-weight="700">펌프</text>
              <rect x="103" y="82" width="34" height="18" rx="7" fill="#ba1a1a"/>
              <circle cx="120" cy="91" r="13" fill="none" stroke="#ba1a1a" stroke-width="5"/>
              <path d="M137 91H225" stroke="#ba1a1a" stroke-width="10" stroke-linecap="round"/>
              <rect x="214" y="45" width="100" height="92" rx="16" fill="#e2e8f0" stroke="#001e40" stroke-width="4"/>
              <path d="M236 60v62M253 60v62M270 60v62M287 60v62" stroke="#94a3b8" stroke-width="4"/>
              <text x="244" y="158" fill="#001e40" font-size="15" font-weight="700">모터</text>
              <path d="M119 68V32H77" fill="none" stroke="#ba1a1a" stroke-width="2"/>
              <text x="15" y="25" fill="#ba1a1a" font-size="15" font-weight="800">베어링</text>
              <path d="M177 87V30h47" fill="none" stroke="#ba1a1a" stroke-width="2"/>
              <text x="229" y="25" fill="#ba1a1a" font-size="15" font-weight="800">모터축</text>
            </svg>
          </div>
          <div class="mt-4 rounded-xl bg-white p-4 text-[16px] leading-6 text-slate-700">
            <strong class="text-error">진동과 온도 상승</strong>이 동시 감지되어 연결부 베어링 또는 모터축의 마모 가능성이 높습니다.
          </div>
        </section>

        <section class="rounded-2xl border p-5">
          <h3 class="whitespace-nowrap text-[22px] font-bold text-primary">실시간 상태 분석</h3>
          <a href="chart.html" class="mt-4 block rounded-2xl border bg-surface-container-low p-4">
            <div class="flex items-start justify-between">
              <div>
                <p class="text-[18px] font-bold">최근 24시간 종합 효율</p>
                <p class="mt-1 text-[14px] font-semibold text-primary">상세 분석 보기</p>
              </div>
              <span class="text-[48px] font-bold text-primary">98%</span>
            </div>
            <div class="mt-4 h-24 overflow-hidden rounded-xl border bg-surface-container" aria-label="최근 24시간 수압 상승 추세 미리보기">
              <svg class="h-full w-full text-primary" viewBox="0 0 300 96" preserveAspectRatio="none" role="img" aria-hidden="true">
                <path d="M0 76 L50 70 L100 73 L150 55 L200 48 L250 35 L300 15 L300 96 L0 96 Z" fill="currentColor" opacity=".1" />
                <path d="M0 76 L50 70 L100 73 L150 55 L200 48 L250 35 L300 15" fill="none" stroke="currentColor" stroke-width="4" vector-effect="non-scaling-stroke" />
              </svg>
            </div>
          </a>
        </section>

        <section>
          <a href="report.html" class="flex w-full items-center justify-center gap-2 rounded-2xl bg-primary py-4 text-[18px] font-bold text-white">
            <span class="material-symbols-outlined">assignment</span>
            안전 점검 기록 확인
          </a>
        </section>
      </main>
    </div>
  </div>
  <script src="navigation.js"></script>
</body>
</html>
