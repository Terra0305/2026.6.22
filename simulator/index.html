<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AquaGuard AI 센서 시뮬레이터</title>
  <link rel="icon" href="/assets/logo.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;word-break:keep-all}
    .scenario:focus-visible,.hotspot:focus-visible{outline:4px solid #38bdf8;outline-offset:4px}
    .farm-stage{position:relative;min-height:470px;overflow:hidden;border-radius:32px;border:1px solid rgba(148,163,184,.45);background-image:linear-gradient(180deg,rgba(2,6,23,.04),rgba(2,6,23,.7)),url('/assets/farm-demo.svg');background-size:cover;background-position:center;box-shadow:0 22px 80px rgba(0,0,0,.35)}
    .farm-stage::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 68% 53%,rgba(248,113,113,.26),transparent 18%),linear-gradient(90deg,rgba(2,6,23,.68),transparent 48%,rgba(2,6,23,.18));pointer-events:none}
    .hotspot{position:absolute;z-index:2;display:flex;align-items:center;gap:12px;border:2px solid rgba(255,255,255,.75);border-radius:999px;padding:14px 18px;font-weight:900;box-shadow:0 16px 36px rgba(0,0,0,.38),0 0 0 8px rgba(255,255,255,.08);transition:transform .18s ease,filter .18s ease}
    .hotspot:hover{transform:translateY(-3px) scale(1.02);filter:brightness(1.08)}
    .hotspot-danger{right:11%;top:45%;background:rgba(239,68,68,.92)}
    .hotspot-normal{left:9%;top:16%;background:rgba(16,185,129,.92);color:#022c22}
    .pulse-ring{position:absolute;z-index:1;border:3px solid rgba(248,113,113,.92);border-radius:999px;animation:ring 1.7s infinite;right:20%;top:49%;width:92px;height:92px}
    @keyframes ring{0%{transform:scale(.72);opacity:.95}100%{transform:scale(1.55);opacity:0}}
  </style>
</head>
<body class="min-h-screen bg-slate-950 text-white">
  <main class="mx-auto max-w-6xl px-8 py-10">
    <header class="flex items-center justify-between gap-8 border-b border-slate-700 pb-8">
      <div class="flex items-center gap-5"><img src="/assets/logo.png" alt="AquaGuard AI" class="h-20 w-20 rounded-2xl bg-white object-contain"/><div><p class="font-bold text-sky-400">HACKATHON CONTROL DESK</p><h1 class="mt-1 text-4xl font-black">현장 센서 시뮬레이터</h1></div></div>
      <div class="text-right"><p class="text-sm text-slate-400">연결 상태 · Build 20260623.5</p><p class="mt-1 flex items-center gap-2 font-bold text-emerald-400"><span class="h-3 w-3 animate-pulse rounded-full bg-emerald-400"></span>기존 화면 실시간 연결</p></div>
    </header>

    <section class="mt-10 grid gap-8 lg:grid-cols-[1.5fr_1fr]">
      <div>
        <h2 class="text-2xl font-bold">현장 위치 선택</h2>
        <p class="mt-2 text-slate-400">양식장 배관 위 의심 지점을 누르면 기존 AquaGuard 화면의 센서값과 경고가 함께 변합니다.</p>
        <div class="farm-stage mt-6">
          <div class="pulse-ring" aria-hidden="true"></div>
          <button data-scenario="normal" class="hotspot hotspot-normal">
            <span class="text-2xl">✓</span><span>정상 상태</span>
          </button>
          <button data-scenario="danger" class="hotspot hotspot-danger">
            <span class="text-2xl">⚠</span><span>마모 발생</span>
          </button>
          <div class="absolute bottom-5 left-5 z-[2] max-w-sm rounded-3xl border border-white/20 bg-slate-950/80 p-5 backdrop-blur">
            <p class="text-sm font-bold text-sky-300">현장 데모 모드</p>
            <p class="mt-2 text-2xl font-black">수조 #03 메인 배관</p>
            <p class="mt-2 text-sm text-slate-300">마모 발생을 누르면 수압·진동이 점진적으로 상승하고 모바일 화면에 긴급 알림이 표시됩니다.</p>
          </div>
        </div>
        <div class="mt-5 grid grid-cols-2 gap-4">
          <button data-scenario="warning" class="scenario rounded-2xl border-2 border-amber-500 bg-amber-500/10 p-5 text-left transition hover:-translate-y-1 hover:bg-amber-500/20"><span class="text-2xl">!</span><strong class="ml-2 text-xl text-amber-400">부하 증가</strong><span class="mt-2 block text-slate-300">7.4 bar · 진동 55점</span></button>
          <button data-scenario="recovery" class="scenario rounded-2xl border-2 border-sky-500 bg-sky-500/10 p-5 text-left transition hover:-translate-y-1 hover:bg-sky-500/20"><span class="text-2xl">↘</span><strong class="ml-2 text-xl text-sky-400">복구 시작</strong><span class="mt-2 block text-slate-300">6.3 bar · 진동 32점</span></button>
        </div>
        <div class="mt-6 rounded-2xl border border-slate-700 bg-slate-900 p-5">
          <div class="flex items-center justify-between"><span id="animation-status" class="font-bold text-slate-300">시나리오 대기 중</span><span id="animation-percent" class="font-bold text-sky-400">0%</span></div>
          <div class="mt-3 h-3 overflow-hidden rounded-full bg-slate-700"><div id="animation-progress" class="h-full w-0 rounded-full bg-sky-400 transition-[width] duration-200"></div></div>
        </div>
        <button id="notification-permission" class="mt-6 w-full rounded-2xl border border-slate-600 bg-slate-800 px-6 py-4 text-lg font-bold hover:bg-slate-700">브라우저 알림 허용</button>
      </div>

      <aside class="rounded-3xl border border-slate-700 bg-slate-900 p-7">
        <div class="flex items-center justify-between"><h2 class="text-2xl font-bold">현재 전송값</h2><span id="status-badge" class="rounded-full bg-emerald-500 px-4 py-2 font-bold text-slate-950">정상</span></div>
        <dl class="mt-8 space-y-5">
          <div class="rounded-2xl bg-slate-800 p-5"><dt class="text-slate-400">현재 수압</dt><dd class="mt-1 text-4xl font-black"><span id="pressure">5.2</span> <small class="text-lg text-slate-400">bar</small></dd></div>
          <div class="rounded-2xl bg-slate-800 p-5"><dt class="text-slate-400">진동 이상 점수</dt><dd class="mt-1 text-4xl font-black"><span id="vibration">18</span> <small class="text-lg text-slate-400">점</small></dd></div>
        </dl>
        <h3 class="mt-8 font-bold">이벤트 로그</h3>
        <ol id="event-log" class="mt-3 max-h-48 space-y-2 overflow-y-auto text-sm text-slate-300"><li class="rounded-xl bg-slate-800 p-3">시뮬레이터 준비 완료</li></ol>
      </aside>
    </section>
  </main>
  <script src="/demo-state.js?v=20260623-5"></script>
  <script>
    const badgeColors={normal:'bg-emerald-500',warning:'bg-amber-400',danger:'bg-red-500 text-white',recovery:'bg-sky-400'};
    const pressure=document.getElementById('pressure'), vibration=document.getElementById('vibration'), statusBadge=document.getElementById('status-badge'), log=document.getElementById('event-log');
    let lastTone=null,completedEvent=null;
    function addLog(text){const item=document.createElement('li');item.className='rounded-xl bg-slate-800 p-3';item.textContent=`${new Date().toLocaleTimeString()} · ${text}`;log.prepend(item)}
    function render(state){
      pressure.textContent=state.pressure.toFixed(1); vibration.textContent=state.vibration; statusBadge.textContent=state.label;
      statusBadge.className=`rounded-full px-4 py-2 font-bold text-slate-950 ${badgeColors[state.tone]}`;
      if(state.transition){
        const percent=Math.round((state.transitionProgress||0)*100),remaining=Math.max(0,Math.ceil((state.transition.duration-(Date.now()-state.transition.startedAt))/1000));
        document.getElementById('animation-percent').textContent=`${percent}% · ${remaining}초`;document.getElementById('animation-progress').style.width=`${percent}%`;
        document.getElementById('animation-status').textContent=percent>=100?`${AquaGuardDemo.scenarios[state.transition.targetId].label} 시나리오 완료`:`${AquaGuardDemo.scenarios[state.transition.targetId].label} 시나리오 진행 중`;
        if(percent>=100&&completedEvent!==state.eventId){completedEvent=state.eventId;addLog(`${AquaGuardDemo.scenarios[state.transition.targetId].label} 목표값 도달`)}
      }
      if(lastTone&&lastTone!==state.tone)addLog(`${state.label} 기준 진입`);
      if(state.tone==='danger'&&lastTone!=='danger')AquaGuardDemo.notifyDanger(state);
      lastTone=state.tone;
    }
    AquaGuardDemo.subscribe(render);
    function startScenario(targetId){
      const start=AquaGuardDemo.materialize(AquaGuardDemo.read()),target=AquaGuardDemo.scenarios[targetId];
      const alreadyNormal=targetId==='normal'&&Math.abs(start.pressure-target.pressure)<0.05&&Math.abs(start.vibration-target.vibration)<=1;
      if(alreadyNormal){
        const state=AquaGuardDemo.publish('normal');
        document.getElementById('animation-status').textContent='이미 정상 상태입니다';
        document.getElementById('animation-percent').textContent='100% · 0초';
        document.getElementById('animation-progress').style.width='100%';
        addLog(`정상 상태 초기화 · ${state.pressure.toFixed(1)} bar`);
        return;
      }
      const baseDurations={normal:8000,warning:4000,danger:6000,recovery:9000},minimumDurations={normal:2500,warning:1800,danger:3500,recovery:2500};
      const referenceDistance={normal:{pressure:3.3,vibration:64},warning:{pressure:2.2,vibration:37},danger:{pressure:3.3,vibration:64},recovery:{pressure:2.2,vibration:50}};
      const reference=referenceDistance[targetId],distanceRatio=Math.min(1,Math.max(Math.abs(target.pressure-start.pressure)/reference.pressure,Math.abs(target.vibration-start.vibration)/reference.vibration));
      const duration=Math.max(minimumDurations[targetId],Math.round(baseDurations[targetId]*distanceRatio/100)*100);
      completedEvent=null;
      addLog(`${target.label} 시나리오 시작 · ${(duration/1000).toFixed(1)}초`);
      AquaGuardDemo.startTransition(targetId,duration);
    }
    document.querySelectorAll('[data-scenario]').forEach((button)=>button.addEventListener('click',async()=>{
      if(button.dataset.scenario==='danger'&&'Notification' in window&&Notification.permission==='default')await AquaGuardDemo.requestNotifications();
      startScenario(button.dataset.scenario);
    }));
    document.getElementById('notification-permission').addEventListener('click',async(event)=>{
      const result=await AquaGuardDemo.requestNotifications(); event.currentTarget.textContent=result==='granted'?'브라우저 알림 사용 중':'브라우저 알림이 차단됨';
    });
  </script>
</body>
</html>
