<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>상세 분석 - AquaGuard AI</title>
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#001e40',
            secondary: '#006a6a',
            background: '#f9f9fe',
            surface: '#f9f9fe',
            'surface-container': '#eef2f7',
            'surface-container-low': '#f7f7fb',
            error: '#ba1a1a'
          }
        }
      }
    };
  </script>
  <style>
    body {
      background: #eef2f7;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      word-break: keep-all;
    }
    button { white-space: nowrap; }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 40;
    }
    .phone-screen {
      height: calc(100% - 28px);
      overflow-y: auto;
      overscroll-behavior: contain;
      scrollbar-width: thin;
    }
    .range-button[aria-pressed="true"] {
      border-color: #001e40;
      background: #001e40;
      color: #ffffff;
    }
  </style>
</head>
<body class="min-h-screen bg-[#eef2f7] p-3 md:p-4">
  <div class="mx-auto h-[844px] w-[390px] overflow-hidden rounded-[36px] border border-slate-200 bg-white shadow-2xl">
    <div class="flex h-7 items-center justify-center bg-white">
      <div class="h-1.5 w-28 rounded-full bg-slate-900"></div>
    </div>

    <div class="phone-screen bg-white">
      <header class="sticky top-0 z-40 border-b bg-surface">
        <div class="flex h-16 items-center gap-3 px-4">
          <a href="detail.html" aria-label="장비 상세로 돌아가기" class="rounded-full p-2 text-primary hover:bg-surface-container">
            <svg aria-hidden="true" class="h-7 w-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6" /></svg>
          </a>
          <h1 class="whitespace-nowrap text-[22px] font-bold text-primary">상세 분석</h1>
        </div>
      </header>

      <main class="px-5 py-6 space-y-5">
        <section aria-label="기간 선택" class="grid grid-cols-4 gap-2">
          <button type="button" aria-pressed="true" class="range-button rounded-xl border-2 border-slate-400 py-3 text-[16px] font-bold">24시간</button>
          <button type="button" aria-pressed="false" class="range-button rounded-xl border-2 border-slate-400 py-3 text-[16px] font-bold">7일</button>
          <button type="button" aria-pressed="false" class="range-button rounded-xl border-2 border-slate-400 py-3 text-[16px] font-bold">30일</button>
          <button type="button" aria-pressed="false" class="range-button rounded-xl border-2 border-slate-400 py-3 text-[16px] font-bold">1년</button>
        </section>
        <section class="rounded-2xl border p-5">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-[16px] font-semibold text-slate-500">현재 수치</p>
              <div class="mt-1 flex items-end gap-2">
                <span id="chart-pressure" class="text-[48px] font-bold text-error">8.5</span>
                <span class="pb-1 text-[18px] text-slate-500">bar</span>
              </div>
            </div>
            <div id="chart-status" class="rounded-2xl bg-error px-4 py-3 text-[18px] font-bold text-white">위험</div>
          </div>
          <div class="mt-5 h-64 overflow-hidden rounded-2xl border bg-surface-container p-3" aria-label="최근 24시간 수압 변화 차트">
            <svg class="h-full w-full" viewBox="0 0 320 220" role="img" aria-labelledby="pressure-chart-title pressure-chart-desc">
              <title id="pressure-chart-title">메인 펌프 A동 수압 변화</title>
              <desc id="pressure-chart-desc">수압이 6.1 bar에서 8.5 bar까지 상승해 위험 기준 8 bar를 초과했습니다.</desc>
              <defs><linearGradient id="pressure-area" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ba1a1a" stop-opacity=".3"/><stop offset="1" stop-color="#ba1a1a" stop-opacity="0"/></linearGradient></defs>
              <g stroke="#cbd5e1" stroke-dasharray="4 4"><path d="M36 35H306"/><path d="M36 85H306"/><path d="M36 135H306"/><path d="M36 185H306"/></g>
              <path d="M36 70H306" stroke="#ba1a1a" stroke-width="2" stroke-dasharray="7 5"/>
              <text x="39" y="63" fill="#93000a" font-size="12" font-weight="700">위험 기준 8.0</text>
              <path id="live-chart-area" d="M36 170 L80 160 L124 165 L168 135 L212 115 L256 78 L306 48 L306 185 L36 185 Z" fill="url(#pressure-area)"/>
              <polyline id="live-chart-line" points="36,170 80,160 124,165 168,135 212,115 256,78 306,48" fill="none" stroke="#001e40" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
              <circle id="live-chart-marker" cx="306" cy="48" r="7" fill="#ba1a1a" stroke="#fff" stroke-width="3"/>
              <text x="4" y="39" fill="#475569" font-size="12">9 bar</text><text x="4" y="89" fill="#475569" font-size="12">8 bar</text><text x="4" y="139" fill="#475569" font-size="12">7 bar</text><text x="36" y="210" fill="#475569" font-size="12">00시</text><text x="270" y="210" fill="#475569" font-size="12">현재</text>
            </svg>
          </div>
        </section>
        <section class="grid grid-cols-2 gap-3">
          <div class="rounded-2xl border bg-surface-container-low p-4"><p class="whitespace-nowrap text-[14px] font-semibold text-slate-600">24시간 평균</p><p class="mt-1 whitespace-nowrap text-[24px] font-bold text-primary"><span id="chart-average">7.3</span> bar</p></div>
          <div class="rounded-2xl border border-error bg-error-container p-4"><p class="whitespace-nowrap text-[14px] font-semibold text-on-error-container">최고 수압</p><p class="mt-1 whitespace-nowrap text-[24px] font-bold text-error"><span id="chart-max">8.5</span> bar</p></div>
        </section>
      </main>
    </div>
  </div>
  <script>
    document.querySelectorAll('.range-button').forEach((button) => {
      button.addEventListener('click', () => {
        document.querySelectorAll('.range-button').forEach((item) => item.setAttribute('aria-pressed', 'false'));
        button.setAttribute('aria-pressed', 'true');
      });
    });
  </script>
  <script src="demo-state.js?v=20260622-2"></script>
  <script>
    AquaGuardDemo.subscribe((state)=>{
      document.getElementById('chart-pressure').textContent=state.pressure.toFixed(1);
      document.getElementById('chart-max').textContent=Math.max(...state.history).toFixed(1);
      document.getElementById('chart-average').textContent=(state.history.reduce((sum,value)=>sum+value,0)/state.history.length).toFixed(1);
      const status=document.getElementById('chart-status'); status.textContent=state.label; status.className=`rounded-2xl px-4 py-3 text-[18px] font-bold ${state.tone==='normal'?'bg-secondary text-white':state.tone==='warning'?'bg-amber-500 text-white':state.tone==='recovery'?'bg-sky-600 text-white':'bg-error text-white'}`;
      const min=4.5,max=9,step=270/(state.history.length-1);
      const points=state.history.map((value,index)=>`${36+index*step},${185-((value-min)/(max-min))*145}`).join(' ');
      document.getElementById('live-chart-line').setAttribute('points',points);
      document.getElementById('live-chart-area').setAttribute('d',`M${points.replaceAll(' ',',L')} L306,185 L36,185 Z`);
      const last=points.split(' ').pop().split(',');
      document.getElementById('live-chart-marker').setAttribute('cx',last[0]);
      document.getElementById('live-chart-marker').setAttribute('cy',last[1]);
    });
  </script>
  <script src="navigation.js"></script>
</body>
</html>
