<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>안전 점검 기록 - AquaGuard AI</title>
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#001e40',
            secondary: '#006a6a',
            background: '#f9f9fe',
            surface: '#f9f9fe',
            'surface-container': '#eef2f7',
            'surface-container-low': '#f7f7fb',
            error: '#ba1a1a'
          }
        }
      }
    };
  </script>
  <style>
    body {
      background: #eef2f7;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      word-break: keep-all;
    }
    button { white-space: nowrap; }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 40;
    }
    .phone-screen {
      height: calc(100% - 28px);
      overflow-y: auto;
      overscroll-behavior: contain;
      scrollbar-width: thin;
    }
  </style>
</head>
<body class="min-h-screen bg-[#eef2f7] p-3 md:p-4">
  <div class="mx-auto h-[844px] w-[390px] overflow-hidden rounded-[36px] border border-slate-200 bg-white shadow-2xl">
    <div class="flex h-7 items-center justify-center bg-white">
      <div class="h-1.5 w-28 rounded-full bg-slate-900"></div>
    </div>

    <div class="phone-screen bg-white">
      <header class="sticky top-0 z-40 border-b bg-surface">
        <div class="flex h-16 items-center gap-3 px-4">
          <a href="detail.html" aria-label="장비 상세로 돌아가기" class="rounded-full p-2 text-primary hover:bg-surface-container">
            <svg aria-hidden="true" class="h-7 w-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6" /></svg>
          </a>
          <h1 class="whitespace-nowrap text-[22px] font-bold text-primary">안전 점검 기록</h1>
        </div>
      </header>

      <main class="px-5 py-6 space-y-5">
        <section class="rounded-2xl border p-5">
          <div class="flex items-center justify-between">
            <div>
              <p class="whitespace-nowrap text-[16px] font-semibold text-slate-500">최근 점검일</p>
              <h2 class="mt-1 text-[24px] font-bold text-primary">2026.06.22</h2>
            </div>
            <span class="whitespace-nowrap rounded-2xl bg-secondary/10 px-3 py-2 text-[16px] font-bold text-secondary">정상</span>
          </div>
        </section>

        <section class="rounded-2xl border-2 border-error bg-error-container/30 p-5">
          <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-4xl text-error">manufacturing</span>
            <div>
              <p class="whitespace-nowrap text-[15px] font-semibold text-slate-600">의심 부위</p>
              <h2 class="mt-1 whitespace-nowrap text-[24px] font-bold text-error">베어링 / 모터축</h2>
            </div>
          </div>
          <dl class="mt-4 overflow-hidden rounded-xl border bg-white">
            <div class="border-b p-4"><dt class="text-[14px] font-semibold text-slate-500">관련 장비</dt><dd class="mt-1 text-[18px] font-bold text-primary">메인 펌프 A동</dd></div>
            <div class="p-4"><dt class="text-[14px] font-semibold text-slate-500">담당자</dt><dd class="mt-1 text-[18px] font-bold text-primary">김운영 매니저</dd></div>
          </dl>
          <a href="detail.html#suspect-area-title" class="mt-4 flex items-center justify-center gap-2 rounded-xl bg-primary py-4 text-[17px] font-bold text-white">장비 구조도에서 확인 <span class="material-symbols-outlined">chevron_right</span></a>
        </section>

        <section class="space-y-3">
          <div class="rounded-2xl border p-4">
            <p class="text-[16px] font-bold text-primary">부품 교체 이력</p>
            <p class="mt-2 text-[14px] text-slate-500">압축기 필터 교체 완료</p>
          </div>
          <div class="rounded-2xl border p-4">
            <p class="text-[16px] font-bold text-primary">오염도 검사</p>
            <p class="mt-2 text-[14px] text-slate-500">수질 기준치 적합</p>
          </div>
          <div class="rounded-2xl border p-4">
            <p class="text-[16px] font-bold text-primary">차기 점검 안내</p>
            <p class="mt-2 text-[14px] text-slate-500">2026.07.06 예정</p>
          </div>
        </section>
      </main>
    </div>
  </div>
  <script src="navigation.js"></script>
</body>
</html>
