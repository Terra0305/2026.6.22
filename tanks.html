<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>수조 현황 - AquaGuard AI</title>
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
  <script>tailwind.config={theme:{extend:{colors:{primary:'#001e40',secondary:'#006a6a',surface:'#ffffff','surface-container':'#eef2f7',error:'#ba1a1a','error-container':'#ffdad6'}}}};</script>
  <style>
    body{background:#eef2f7;font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;word-break:keep-all}
    .phone-screen{height:calc(100% - 28px);overflow-y:auto;overscroll-behavior:contain;scrollbar-width:thin}
    .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 500,'GRAD' 0,'opsz' 40}
  </style>
</head>
<body class="min-h-screen p-3 md:p-4">
  <div class="mx-auto h-[844px] w-[390px] overflow-hidden rounded-[36px] border border-slate-200 bg-white shadow-2xl">
    <div class="flex h-7 items-center justify-center"><div class="h-1.5 w-28 rounded-full bg-slate-900"></div></div>
    <div class="phone-screen bg-white">
      <header class="sticky top-0 z-40 border-b bg-white">
        <div class="flex h-16 items-center gap-3 px-4">
          <a href="index.html" aria-label="홈으로 돌아가기" class="rounded-full p-2 text-primary hover:bg-surface-container"><svg aria-hidden="true" class="h-7 w-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6" /></svg></a>
          <h1 class="whitespace-nowrap text-[22px] font-bold text-primary">수조 현황</h1>
        </div>
      </header>
      <main class="space-y-5 px-5 py-6">
        <section class="rounded-2xl border-2 border-secondary bg-teal-50 p-5">
          <p class="text-[16px] font-semibold text-slate-600">전체 수조</p>
          <div class="mt-2 flex items-end justify-between"><strong class="text-[36px] text-primary">10개</strong><span id="tank-normal-count" class="whitespace-nowrap rounded-full bg-white px-3 py-2 text-[16px] font-bold text-secondary">9개 정상</span></div>
        </section>
        <section class="space-y-3" aria-label="수조 목록">
          <a id="live-tank-card" href="detail.html" class="flex items-center justify-between rounded-2xl border-2 border-error bg-error-container p-4">
            <div class="flex items-center gap-3"><span id="live-tank-icon" class="material-symbols-outlined text-4xl text-error">waves</span><div><h2 class="text-[20px] font-bold text-primary">A동 3번 수조</h2><p id="live-tank-message" class="mt-1 text-[16px] font-semibold text-error">펌프 수압 이상</p></div></div><span class="material-symbols-outlined text-error">chevron_right</span>
          </a>
          <div class="flex items-center justify-between rounded-2xl border p-4"><div class="flex items-center gap-3"><span class="material-symbols-outlined text-4xl text-secondary">waves</span><div><h2 class="text-[20px] font-bold text-primary">A동 1번 수조</h2><p class="mt-1 text-[16px] text-slate-600">수질 및 장비 정상</p></div></div><span class="whitespace-nowrap rounded-full bg-teal-50 px-3 py-1 font-bold text-secondary">정상</span></div>
          <div class="flex items-center justify-between rounded-2xl border p-4"><div class="flex items-center gap-3"><span class="material-symbols-outlined text-4xl text-secondary">waves</span><div><h2 class="text-[20px] font-bold text-primary">A동 2번 수조</h2><p class="mt-1 text-[16px] text-slate-600">수질 및 장비 정상</p></div></div><span class="whitespace-nowrap rounded-full bg-teal-50 px-3 py-1 font-bold text-secondary">정상</span></div>
          <div class="flex items-center justify-between rounded-2xl border p-4"><div class="flex items-center gap-3"><span class="material-symbols-outlined text-4xl text-secondary">waves</span><div><h2 class="text-[20px] font-bold text-primary">B동 1번 수조</h2><p class="mt-1 text-[16px] text-slate-600">수질 및 장비 정상</p></div></div><span class="whitespace-nowrap rounded-full bg-teal-50 px-3 py-1 font-bold text-secondary">정상</span></div>
        </section>
      </main>
      <nav class="sticky bottom-0 z-50 flex items-center justify-around border-t bg-white px-2 pb-4 pt-3" aria-label="주요 메뉴">
        <a href="index.html" class="flex min-w-[64px] flex-col items-center gap-1 rounded-xl p-2"><span class="material-symbols-outlined text-3xl">home</span><span class="font-bold">홈</span></a>
        <a href="tanks.html" aria-current="page" class="flex min-w-[72px] flex-col items-center gap-1 rounded-xl border border-secondary bg-teal-50 p-2 text-secondary"><span class="material-symbols-outlined text-3xl">waves</span><span class="font-bold">수조</span></a>
        <a href="alerts.html" class="flex min-w-[64px] flex-col items-center gap-1 rounded-xl p-2"><span class="material-symbols-outlined text-3xl">notifications</span><span class="font-bold">알림</span></a>
        <a href="settings.html" class="flex min-w-[64px] flex-col items-center gap-1 rounded-xl p-2"><span class="material-symbols-outlined text-3xl">settings</span><span class="font-bold">설정</span></a>
      </nav>
    </div>
  </div>
  <script src="demo-state.js?v=20260622-2"></script>
  <script>
    AquaGuardDemo.subscribe((state)=>{
      const counts={normal:10,warning:9,danger:9,recovery:9};document.getElementById('tank-normal-count').textContent=`${counts[state.tone]}개 정상`;
      const card=document.getElementById('live-tank-card'),icon=document.getElementById('live-tank-icon'),message=document.getElementById('live-tank-message');
      const config={normal:{text:'수질 및 장비 정상',card:'border-secondary bg-teal-50',color:'text-secondary',icon:'check_circle'},warning:{text:'펌프 센서값 주의',card:'border-amber-600 bg-amber-50',color:'text-amber-800',icon:'error'},danger:{text:'펌프 수압 이상 · 즉시 점검',card:'border-error bg-error-container',color:'text-error',icon:'warning'},recovery:{text:'펌프 상태 복구 중',card:'border-sky-600 bg-sky-50',color:'text-sky-800',icon:'settings_backup_restore'}}[state.tone];
      card.className=`flex items-center justify-between rounded-2xl border-2 p-4 ${config.card}`;icon.textContent=config.icon;icon.className=`material-symbols-outlined text-4xl ${config.color}`;message.textContent=config.text;message.className=`mt-1 text-[16px] font-semibold ${config.color}`;
    });
  </script>
  <script src="navigation.js"></script>
</body>
</html>
